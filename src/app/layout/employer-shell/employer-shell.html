<mat-toolbar color="primary" class="topbar">
  <button matIconButton (click)="toggle()" aria-label="Menu">
    <mat-icon>menu</mat-icon>
  </button>
  <span class="title">ISAS · Nhà tuyển dụng</span>
  <span class="spacer"></span>
  <button matIconButton [matMenuTriggerFor]="userMenu" aria-label="Tài khoản">
    <mat-icon>account_circle</mat-icon>
  </button>
  <mat-menu #userMenu="matMenu">
    <div class="menu-name" mat-menu-item disabled>{{ displayName() || 'Nhà tuyển dụng' }}</div>
    <a mat-menu-item routerLink="profile">
      <mat-icon>person</mat-icon>
      <span>Tài khoản</span>
    </a>
    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Đăng xuất</span>
    </button>
  </mat-menu>
</mat-toolbar>

<mat-sidenav-container class="container">
  <mat-sidenav [opened]="opened()" mode="side" class="sidenav">
    <mat-nav-list>
      @for (item of nav(); track item.path) {
        <a
          mat-list-item
          [routerLink]="item.path"
          routerLinkActive
          #rla="routerLinkActive"
          [activated]="rla.isActive"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
