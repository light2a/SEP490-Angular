<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>IsasFrontend</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <style>
      /* Splash hiển thị ngay khi cold-load (vd: quay về từ PayOS) — Angular tự thay khi bootstrap xong. */
      #isas-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #f7f8fa;
        font-family: Roboto, system-ui, -apple-system, sans-serif;
      }
      #isas-splash .brand {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 3px;
        color: #1a56db;
      }
      #isas-splash .ring {
        width: 38px;
        height: 38px;
        border: 4px solid #dbe2f0;
        border-top-color: #1a56db;
        border-radius: 50%;
        animation: isas-spin 0.8s linear infinite;
      }
      #isas-splash .sub {
        font-size: 13px;
        color: #6b7280;
      }
      @keyframes isas-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-color-scheme: dark) {
        #isas-splash {
          background: #0f1115;
        }
        #isas-splash .brand {
          color: #5b8def;
        }
        #isas-splash .ring {
          border-color: #2a2f3a;
          border-top-color: #5b8def;
        }
        #isas-splash .sub {
          color: #9aa4b2;
        }
      }
    </style>
  </head>
  <body>
    <app-root>
      <div id="isas-splash">
        <div class="brand">ISAS</div>
        <div class="ring"></div>
        <div class="sub">Đang tải…</div>
      </div>
    </app-root>
  </body>
</html>
